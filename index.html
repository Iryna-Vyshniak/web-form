<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Flip Form - Create Account & Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/index.css" />
  </head>
  <body>
    <div class="scene">
      <!-- Hidden checkbox controls the 3D flip -->
      <input type="checkbox" id="flip-toggle" />

      <main class="card">
        <!-- ==============================================
                 FRONT FACE: CREATE ACCOUNT
            ============================================== -->
        <section class="face front">
          <div class="face-content">
            <h1 class="card-title">Create an Account</h1>

            <form onsubmit="event.preventDefault()">
              <div class="grid-layout">
                <div class="form-group">
                  <label for="firstName">First Name</label>
                  <input type="text" id="firstName" value="" />
                </div>
                <div class="form-group">
                  <label for="lastName">Last Name</label>
                  <input type="text" id="lastName" />
                </div>

                <div class="form-group col-full">
                  <label for="email">E-mail</label>
                  <input type="email" id="email" />
                  <p class="helper-text">We'll never share your email with anyone else.</p>
                </div>

                <div class="form-group col-full">
                  <div class="radio-group">
                    <label class="radio-label">
                      <input type="radio" name="gender" value="male" checked />
                      <span class="radio-custom"></span>
                      <span>Male</span>
                    </label>
                    <label class="radio-label">
                      <input type="radio" name="gender" value="female" />
                      <span class="radio-custom"></span>
                      <span>Female</span>
                    </label>
                  </div>
                </div>

                <div class="form-group">
                  <label for="country">Country</label>
                  <select id="country">
                    <option value="" disabled selected>Select</option>
                    <option value="ua">Ukraine</option>
                    <option value="uk">United Kingdom</option>
                    <option value="us">United States</option>
                    <option value="ca">Canada</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="city">City</label>
                  <input type="text" id="city" />
                </div>
              </div>

              <button type="button" class="btn-primary">Sign Up</button>

              <div class="disclaimer">
                By clicking the 'Sign Up' button, you confirm that you accept our<br />
                <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>
              </div>

              <div class="form-footer">
                Have an account? <label for="flip-toggle" class="flip-link">Log In</label>
              </div>
            </form>
          </div>
        </section>

        <!-- ==============================================
                 BACK FACE: PROFILE
                 ============================================== -->
        <section class="face back">
          <div class="face-content">
            <h2 class="card-title">Profile</h2>

            <form onsubmit="event.preventDefault()">
              <div class="profile-header">
                <div class="avatar-wrapper">
                  <img
                    src="./assets/images/avatar.png"
                    alt="Avatar"
                    class="avatar-img"
                    width="80"
                    height="80"
                  />
                </div>
                <div class="upload-controls">
                  <div class="action-buttons">
                    <!-- Replaced div with functional label + file input -->
                    <label class="input-file-dummy" for="photo-upload">
                      <input type="file" id="photo-upload" accept="image/*" style="display: none" />
                      <span></span>
                      <img src="./assets/icons/photo-icon.svg" alt="" aria-hidden="true" />
                    </label>
                    <!-- CSS Anchor positioning triggered here -->
                    <button type="button" class="icon-btn anchor-trigger" aria-label="Delete Photo">
                      <img src="./assets/icons/trash-icon.svg" alt="" aria-hidden="true" />
                    </button>
                    <div class="anchor-tooltip">Remove photo</div>
                  </div>
                  <p class="helper-text">Up to 1 MB (300x300 px)</p>
                </div>
              </div>

              <div class="grid-layout" style="margin-block-end: 32px">
                <div class="form-group">
                  <label for="p-name">Name</label>
                  <input type="text" id="p-name" />
                </div>
                <div class="form-group">
                  <label for="p-email">E-mail</label>
                  <input type="email" id="p-email" />
                </div>

                <div class="form-group">
                  <label for="p-country">Country</label>
                  <select id="p-country">
                    <option value="" disabled selected>Select</option>
                    <option value="ua">Ukraine</option>
                    <option value="uk">United Kingdom</option>
                    <option value="us">United States</option>
                    <option value="ca">Canada</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="p-city">City</label>
                  <input type="text" id="p-city" />
                </div>

                <div class="form-group">
                  <label for="p-zip">Zip Code</label>
                  <input type="text" id="p-zip" />
                </div>
                <div class="form-group">
                  <label for="p-phone">Phone Number</label>
                  <input type="tel" id="p-phone" />
                </div>
              </div>

              <button type="button" class="btn-primary auto-width">Update</button>

              <div
                class="form-footer"
              >
                <label for="flip-toggle" class="flip-link">← Back to Create Account</label>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
